<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project manager</title>
</head>
<body>
    <div class="sidebar">
        <div class="nav-container">
            <div class="nav-content">
                <h3 class="nav-header">All tasks</h3>
                <nav class="filter-container">
                    <ul>
                        <li class="filter"><button id="today">Today</button></li>
                        <li class="filter"><button id="upcoming">Upcoming</button></li>
                        <li class="filter"><button id="completed">Completed</button></li>
                        <li class="filter"><button id="add-task"><b>+</b> Add Task</button></li>
                    </ul>
                </nav>
            </div>
            <div class="nav-content">
                <h3 class="nav-header">My projects</h3>
                <nav class="filter-container">
                    <ul>
                        <li class="filter"><button id="add-project"><b>+</b> Add Project</button></li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
    <div class="header">
        <div class="header-container">
            <h1 class="header-text">Project manager</h1>
            <h2 class="sub-header"><i>All of your projects in one place.</i></h2>
        </div>
    </div>
    <div class="content">

    </div>
</body>
</html>
